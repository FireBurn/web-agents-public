name: Build and Release WebAgents

on:
  push:
    branches: [ "master", "main" ]
    tags: [ "[0-9]*" ]
  pull_request:
    branches: [ "master", "main" ]
  # Nightly run exercises the slow/stress tests that are skipped on PRs.
  schedule:
    - cron: '0 3 * * *'
  # Manual trigger for ad-hoc runs of the slow-test job
  workflow_dispatch:

# softprops/action-gh-release needs write access to create releases
permissions:
  contents: write

# -----------------------------------------------------------------------------
# Shared env — keeps the ctest invocation consistent across jobs.
#
# Slow tests (labelled `slow` in tests/CMakeLists.txt) and known-broken
# tests (labelled `broken`) are excluded from the PR/push pipeline.
# They run nightly via the `slow-tests` job below.
# -----------------------------------------------------------------------------
env:
  CTEST_DEFAULT_ARGS: --output-on-failure -LE "slow|broken" -j 4

jobs:

  # ---------------------------------------------------------------------------
  # Formatting gate: fails the build if any C/H file isn't clang-format clean.
  # Runs on every push/PR so contributors without the pre-commit hook still
  # get caught before merge.
  # ---------------------------------------------------------------------------
  lint-format:
    name: Check formatting
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
    - uses: actions/checkout@v4
    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format
    - name: Verify formatting
      run: |
        find source tests integration -type f \( -name '*.c' -o -name '*.h' \) -print0 \
          | xargs -0 clang-format --dry-run --Werror


  # ---------------------------------------------------------------------------
  # Native build matrix: Ubuntu, macOS, Windows
  # ---------------------------------------------------------------------------
  build-native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
    - uses: actions/checkout@v4

    # Version to embed in the binaries: the tag name on a tag push,
    # or "dev-<sha>" otherwise.
    - name: Derive version
      id: version
      shell: bash
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
        else
          echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
        fi

    - name: Install Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          pkg-config \
          libpcre2-dev \
          libexpat1-dev \
          zlib1g-dev \
          libzip-dev \
          libssl-dev \
          libapr1-dev \
          libaprutil1-dev \
          apache2-dev \
          libcmocka-dev

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake pkg-config pcre2 expat zlib libzip openssl@3 httpd cmocka
        {
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)"
          echo "PKG_CONFIG_PATH=$(brew --prefix libzip)/lib/pkgconfig:$(brew --prefix openssl@3)/lib/pkgconfig:$(brew --prefix pcre2)/lib/pkgconfig:$(brew --prefix cmocka)/lib/pkgconfig"
        } >> "$GITHUB_ENV"

    - name: Install Dependencies (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        vcpkg install \
          pcre2:x64-windows \
          expat:x64-windows \
          zlib:x64-windows \
          libzip:x64-windows \
          openssl:x64-windows \
          cmocka:x64-windows

    - name: Configure and Build (Unix)
      if: runner.os != 'Windows'
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DAGENT_VERSION=${{ steps.version.outputs.version }}
        cmake --build build --config Release -j 4

    - name: Configure and Build (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        # IIS SDK isn't available on GitHub runners, so the Windows build
        # produces the core library + admin tool only (no mod_iis_openam,
        # no Apache module). Apache is built on Unix runners.
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DAGENT_VERSION=${{ steps.version.outputs.version }} \
          -DBUILD_APACHE_MODULE=OFF \
          -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_TARGET_TRIPLET=x64-windows
        cmake --build build --config Release -j 4

    - name: Run Tests
      shell: bash
      working-directory: build
      # No wall-clock --timeout here: each test has its own per-test timeout
      # in tests/CMakeLists.txt (60s default, 600s for slow tests).
      run: ctest ${{ env.CTEST_DEFAULT_ARGS }}

    - name: Package Artifacts
      shell: bash
      run: |
        mkdir -p package/lib package/bin
        # Linux/macOS layout: artifacts in build/
        # Windows (MSBuild multi-config) layout: artifacts in build/Release/
        for src in build build/Release; do
          [ -d "$src" ] || continue
          cp "$src"/agentadmin*    package/bin/ 2>/dev/null || true
          cp "$src"/mod_*          package/lib/ 2>/dev/null || true
          cp "$src"/libopenam*     package/lib/ 2>/dev/null || true
          cp "$src"/openam*.dll    package/lib/ 2>/dev/null || true
          cp "$src"/openam*.dylib  package/lib/ 2>/dev/null || true
        done
        cd package && zip -r "../OpenAM-WebAgent-${{ runner.os }}.zip" .

    - name: Upload Workflow Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenAM-WebAgent-${{ runner.os }}
        path: OpenAM-WebAgent-${{ runner.os }}.zip

    - name: Attach to GitHub Release
      if: github.ref_type == 'tag'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: OpenAM-WebAgent-${{ runner.os }}.zip
        generate_release_notes: true
        fail_on_unmatched_files: true


  # ---------------------------------------------------------------------------
  # RHEL / AlmaLinux / CentOS Stream matrix: 7, 8, 9, 10
  #
  # RHEL 6 has its own dedicated job below because it needs several deps
  # built from source (none of pcre2, libzip, cmocka, or a modern cmake
  # are in EPEL 6), which would slow the whole matrix down.
  # ---------------------------------------------------------------------------
  build-rhel:
    name: Build RHEL ${{ matrix.rhel_version }}
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        rhel_version: [ '7', '8', '9', '10' ]
        include:
          - rhel_version: '7'
            container_image: 'centos:7'
          - rhel_version: '8'
            container_image: 'almalinux:8'
          - rhel_version: '9'
            container_image: 'almalinux:9'
          - rhel_version: '10'
            container_image: 'quay.io/centos/centos:stream10'

    container:
      image: ${{ matrix.container_image }}

    steps:
    - uses: actions/checkout@v4

    - name: Derive version
      id: version
      shell: bash
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
        else
          echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
        fi

    - name: Fix EOL Repos for CentOS 7
      if: matrix.rhel_version == '7'
      run: |
        sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-*.repo || true
        sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*.repo || true

    - name: Install Dependencies (RHEL 7)
      if: matrix.rhel_version == '7'
      run: |
        yum install -y epel-release
        yum install -y \
          gcc gcc-c++ make zip pkgconfig cmake3 \
          pcre2-devel expat-devel zlib-devel openssl-devel libzip-devel \
          apr-devel apr-util-devel httpd-devel \
          libcmocka-devel
        # RHEL 7 calls modern cmake 'cmake3'
        ln -sf /usr/bin/cmake3 /usr/bin/cmake
        ln -sf /usr/bin/ctest3 /usr/bin/ctest

    - name: Install Dependencies (RHEL 8, 9, 10)
      if: matrix.rhel_version == '8' || matrix.rhel_version == '9' || matrix.rhel_version == '10'
      run: |
        dnf install -y epel-release || true
        dnf install -y \
          gcc gcc-c++ make cmake zip pkgconfig \
          pcre2-devel expat-devel zlib-devel openssl-devel libzip-devel \
          apr-devel apr-util-devel httpd-devel \
          libcmocka-devel

    - name: Configure and Build
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DAGENT_VERSION=${{ steps.version.outputs.version }}
        cmake --build build --config Release -j 4

    - name: Run Tests
      working-directory: build
      run: ctest ${{ env.CTEST_DEFAULT_ARGS }}

    - name: Package Artifacts
      run: |
        mkdir -p package/lib package/bin
        cp build/agentadmin* package/bin/ 2>/dev/null || true
        cp build/mod_*       package/lib/ 2>/dev/null || true
        cp build/libopenam*  package/lib/ 2>/dev/null || true
        cd package && zip -r "../OpenAM-WebAgent-RHEL-${{ matrix.rhel_version }}.zip" .

    - name: Upload Workflow Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenAM-WebAgent-RHEL-${{ matrix.rhel_version }}
        path: OpenAM-WebAgent-RHEL-${{ matrix.rhel_version }}.zip

    - name: Attach to GitHub Release
      if: github.ref_type == 'tag'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: OpenAM-WebAgent-RHEL-${{ matrix.rhel_version }}.zip
        generate_release_notes: true
        fail_on_unmatched_files: true


  # ---------------------------------------------------------------------------
  # RHEL 6 — best-effort, legacy.
  #
  # WARNING: CentOS 6 has been EOL since 2020-11-30. This job exists to
  # support legacy environments and is NOT a recommendation. Several deps
  # must be built from source because they're not in the CentOS 6 base
  # repos or EPEL 6:
  #   - cmake 3.x (base repo has 2.8 — too old for our CMakeLists.txt)
  #   - pcre2    (EPEL 6 only has PCRE1)
  #   - libzip   (not in base or EPEL 6)
  #   - cmocka   (not in base or EPEL 6)
  #
  # The step times out after 30 minutes. If it becomes flaky, drop it to
  # a weekly schedule or remove the job entirely — RHEL 6 has been
  # unsupported by Red Hat itself for nearly 6 years.
  #
  # Sources are cached between runs so only the initial build is slow.
  # ---------------------------------------------------------------------------
  build-rhel6:
    name: Build RHEL 6 (legacy, best-effort)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    continue-on-error: true   # Don't fail the whole CI pipeline if RHEL 6 breaks
    timeout-minutes: 30
    container:
      image: centos:6

    steps:
    - name: Fix EOL Repos for CentOS 6
      run: |
        # All CentOS 6 repos point at the dead mirror network; redirect to vault.
        sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-*.repo || true
        sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*.repo || true

    - name: Install Base Build Tools
      run: |
        yum install -y epel-release || true
        yum install -y \
          gcc gcc-c++ make zip tar wget which pkgconfig \
          expat-devel zlib-devel openssl-devel \
          apr-devel apr-util-devel httpd-devel

    # actions/checkout@v4 requires glibc >= 2.17 (CentOS 6 has 2.12),
    # so we fall back to v1 which still works on old distros.
    - name: Checkout (legacy-compatible)
      uses: actions/checkout@v1

    - name: Derive version
      id: version
      shell: bash
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
        else
          echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
        fi

    # Cache the from-source dependencies so we only pay the ~10 minute
    # build cost on first run or when versions change.
    - name: Cache legacy dependencies
      id: rhel6-cache
      uses: actions/cache@v3
      with:
        path: /opt/legacy
        # Bump this suffix to invalidate the cache if you change
        # versions or build flags below.
        key: rhel6-deps-cmake3.22.6-pcre2-10.42-libzip-1.10.1-cmocka-1.1.7-v2

    - name: Install CMake 3.22 (binary)
      if: steps.rhel6-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p /opt/legacy
        cd /tmp
        wget -q https://github.com/Kitware/CMake/releases/download/v3.22.6/cmake-3.22.6-linux-x86_64.tar.gz
        tar -xzf cmake-3.22.6-linux-x86_64.tar.gz -C /opt/legacy --strip-components=1

    - name: Build PCRE2 from source
      if: steps.rhel6-cache.outputs.cache-hit != 'true'
      run: |
        cd /tmp
        wget -q https://github.com/PCRE2Project/pcre2/releases/download/pcre2-10.42/pcre2-10.42.tar.gz
        tar -xzf pcre2-10.42.tar.gz
        cd pcre2-10.42
        ./configure --prefix=/opt/legacy --enable-shared --disable-static --disable-dependency-tracking
        make -j4 && make install

    - name: Build libzip from source
      if: steps.rhel6-cache.outputs.cache-hit != 'true'
      run: |
        export PATH=/opt/legacy/bin:$PATH
        cd /tmp
        # libzip 1.10.x is the last line that builds cleanly on CentOS 6's
        # older gcc and zlib. Newer 1.11+ wants C11 features not available.
        wget -q https://libzip.org/download/libzip-1.10.1.tar.gz
        tar -xzf libzip-1.10.1.tar.gz
        cd libzip-1.10.1
        cmake -B build \
          -DCMAKE_INSTALL_PREFIX=/opt/legacy \
          -DBUILD_SHARED_LIBS=ON \
          -DBUILD_TOOLS=OFF \
          -DBUILD_REGRESS=OFF \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_DOC=OFF \
          -DENABLE_BZIP2=OFF \
          -DENABLE_LZMA=OFF \
          -DENABLE_ZSTD=OFF
        cmake --build build -j4
        cmake --install build

    - name: Build cmocka from source
      if: steps.rhel6-cache.outputs.cache-hit != 'true'
      run: |
        export PATH=/opt/legacy/bin:$PATH
        cd /tmp
        wget -q https://cmocka.org/files/1.1/cmocka-1.1.7.tar.xz
        tar -xf cmocka-1.1.7.tar.xz
        cd cmocka-1.1.7
        cmake -B build \
          -DCMAKE_INSTALL_PREFIX=/opt/legacy \
          -DCMAKE_BUILD_TYPE=Release \
          -DUNIT_TESTING=OFF
        cmake --build build -j4
        cmake --install build

    - name: Configure and Build OpenAM Web Agents
      run: |
        export PATH=/opt/legacy/bin:$PATH
        export PKG_CONFIG_PATH=/opt/legacy/lib/pkgconfig:/opt/legacy/lib64/pkgconfig
        export LD_LIBRARY_PATH=/opt/legacy/lib:/opt/legacy/lib64
        # RHEL 6 ships gcc 4.4.7 — C99 strict mode is needed for some features
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DAGENT_VERSION=${{ steps.version.outputs.version }} \
          -DCMAKE_C_FLAGS="-std=gnu99"
        cmake --build build --config Release -j 4

    - name: Run Tests
      working-directory: build
      run: |
        export PATH=/opt/legacy/bin:$PATH
        export LD_LIBRARY_PATH=/opt/legacy/lib:/opt/legacy/lib64
        ctest ${{ env.CTEST_DEFAULT_ARGS }}

    - name: Package Artifacts
      run: |
        mkdir -p package/lib package/bin
        cp build/agentadmin* package/bin/ 2>/dev/null || true
        cp build/mod_*       package/lib/ 2>/dev/null || true
        cp build/libopenam*  package/lib/ 2>/dev/null || true
        # Bundle the vendored deps so the tarball is self-contained on a
        # stock RHEL 6 box that won't have pcre2/libzip from any repo.
        mkdir -p package/vendor-lib
        cp -a /opt/legacy/lib*/libpcre2-8.so* package/vendor-lib/ 2>/dev/null || true
        cp -a /opt/legacy/lib*/libzip.so*     package/vendor-lib/ 2>/dev/null || true
        cp -a /opt/legacy/lib*/libcmocka.so*  package/vendor-lib/ 2>/dev/null || true
        cd package && zip -r ../OpenAM-WebAgent-RHEL-6.zip .

    - name: Upload Workflow Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenAM-WebAgent-RHEL-6
        path: OpenAM-WebAgent-RHEL-6.zip

    - name: Attach to GitHub Release
      if: github.ref_type == 'tag'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: OpenAM-WebAgent-RHEL-6.zip
        generate_release_notes: true
        fail_on_unmatched_files: false   # RHEL 6 may legitimately fail to build


  # ---------------------------------------------------------------------------
  # Nightly slow-test job — exercises the tests labelled `slow` in
  # tests/CMakeLists.txt (shared-memory stress, threaded log worker,
  # policy-cache concurrency). These are excluded from the PR pipeline
  # because they add several minutes per run and can be flaky in
  # resource-constrained CI runners.
  #
  # Runs on the `schedule` trigger (03:00 UTC nightly) and can also be
  # kicked off manually via the "Run workflow" button.
  # ---------------------------------------------------------------------------
  slow-tests:
    name: Slow tests (nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake pkg-config \
          libpcre2-dev libexpat1-dev zlib1g-dev libzip-dev libssl-dev \
          libapr1-dev libaprutil1-dev apache2-dev libcmocka-dev

    - name: Configure and Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build -j 4

    - name: Run Slow Tests
      working-directory: build
      # Only the `slow` label, exclude broken. These tests have 600s
      # per-test timeouts set in CMakeLists.txt.
      run: ctest --output-on-failure -L slow -LE broken -j 2
